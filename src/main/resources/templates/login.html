<!DOCTYPE html>
<html lang="da" xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Login</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" th:href="@{/css/base/base.css}">
  <link rel="stylesheet" th:href="@{/css/components/navbar.css}">
  <link rel="stylesheet" th:href="@{/css/pages/login.css}">
</head>

<body>

<main class="form-page">

  <section class="form-card">

    <div class="auth-tabs">

      <button type="button"
              id="loginTab"
              class="auth-tab active"
              onclick="showForm('login')">
        Login
      </button>

      <button type="button"
              id="registerTab"
              class="auth-tab"
              onclick="showForm('register')">
        Register
      </button>

      <button type="button"
              id="employeeTab"
              class="auth-tab"
              onclick="showForm('employee')">
        Medarbejder
      </button>

    </div>

    <!-- LOGIN -->

    <div id="loginForm" class="auth-form active">

      <h1>Login</h1>

      <form method="post" action="/login">

        <label>Email</label>
        <input type="email"
               name="email"
               required>

        <label>Telefon</label>
        <input type="tel"
               name="phone"
               required>

        <label>Adgangskode</label>
        <input type="password"
               name="password"
               required>

        <button type="submit">
          Login
        </button>

      </form>

    </div>


    <!-- REGISTER -->

    <div id="registerForm" class="auth-form">

      <h1>Register</h1>

      <form method="post" action="/registerUser">

        <label>Email</label>
        <input type="email"
               name="email"
               required>

        <label>Telefon</label>
        <input type="tel"
               name="phone"
               required>

        <label>Adgangskode</label>
        <input type="password"
               name="password"
               required>

        <button type="submit">
          Opret bruger
        </button>

      </form>

    </div>


    <!-- MEDARBEJDER -->

    <div id="employeeForm" class="auth-form">

      <h1>Medarbejder Login</h1>

      <form method="post" action="/employeeLogin">

        <label>Email</label>
        <input type="email"
               name="email"
               required>

        <label>Adgangskode</label>
        <input type="password"
               name="password"
               required>

        <button type="submit">
          Login som medarbejder
        </button>

      </form>

    </div>

  </section>

</main>

<script src="/js/script.js"></script>

</body>
</html>
