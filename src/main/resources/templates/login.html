<!DOCTYPE html>
<html lang="da" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" th:href="@{/css/pages/login.css}">
</head>

<body>

<main class="form-page">

    <section class="form-card">

        <button class="back-button"
                onclick="window.location.href='/'">
            ← Tilbage til forsiden
        </button>

        <div class="auth-tabs">

            <button id="loginTab"
                    class="auth-tab active"
                    onclick="showForm('login')">
                Login
            </button>

            <button id="registerTab"
                    class="auth-tab"
                    onclick="showForm('register')">
                Register
            </button>

            <button id="employeeTab"
                    class="auth-tab"
                    onclick="showForm('employee')">
                Medarbejder
            </button>

        </div>


        <!-- LOGIN -->

        <div id="loginForm"
             class="auth-form active">

            <h1>Login</h1>

            <form method="post"
                  action="/login">

                <label>Email</label>
                <input type="email"
                       name="email"
                       required>

<!--                <label>Telefon</label>-->
<!--                <input type="tel"-->
<!--                       name="phone"-->
<!--                       required>-->

                <label>Adgangskode</label>
                <input type="password"
                       name="password"
                       required>

                <button type="submit">
                    Login
                </button>

            </form>

        </div>


        <!-- REGISTER -->

        <div id="registerForm"
             class="auth-form">

            <h1>Register</h1>

            <form method="post"
                  action="/registerUser">

                <label>Email</label>
                <input type="email"
                       name="email"
                       required>

                <label>Telefon</label>
                <input type="tel"
                       name="phone"
                       required>

                <label>Adgangskode</label>
                <input type="password"
                       name="password"
                       required>

                <button type="submit">
                    Opret bruger
                </button>

            </form>

        </div>


        <!-- MEDARBEJDER -->

        <div id="employeeForm"
             class="auth-form">

            <h1>Medarbejder Login</h1>

            <form method="post"
                  action="/employeeLogin">

                <label>Email</label>
                <input type="email"
                       name="email"
                       required>

                <label>Adgangskode</label>
                <input type="password"
                       name="password"
                       required>

                <button type="submit">
                    Login som medarbejder
                </button>

            </form>

        </div>

    </section>

</main>


<script>

    function showForm(type){

        document.getElementById("loginForm").classList.remove("active");
        document.getElementById("registerForm").classList.remove("active");
        document.getElementById("employeeForm").classList.remove("active");

        document.getElementById("loginTab").classList.remove("active");
        document.getElementById("registerTab").classList.remove("active");
        document.getElementById("employeeTab").classList.remove("active");


        if(type==="login"){

            document.getElementById("loginForm")
                .classList.add("active");

            document.getElementById("loginTab")
                .classList.add("active");

        }


        if(type==="register"){

            document.getElementById("registerForm")
                .classList.add("active");

            document.getElementById("registerTab")
                .classList.add("active");

        }


        if(type==="employee"){

            document.getElementById("employeeForm")
                .classList.add("active");

            document.getElementById("employeeTab")
                .classList.add("active");

        }

    }

</script>

</body>
</html>
