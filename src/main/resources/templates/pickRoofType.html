<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Choose Roof Type</title>
</head>
<body>

<form action="/carport" method="post">

    <label for="roofType">Choose roof type:</label>

    <select name="roofType" id="roofType">

        <option value="Flat">
            Flat Roof
        </option>

        <option value="High">
            High Roof
        </option>

    </select>

    <button type="submit">
        Continue
    </button>

</form>

</body>
</html>
